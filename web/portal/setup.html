<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <title>BenderVPN — получить настройку</title>
  <link rel="stylesheet" href="assets/portal.css">
  <script src="https://telegram.org/js/telegram-web-app.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js" defer></script>
  <script src="assets/setup.js" defer></script>
</head>
<body>
  <main>
    <header class="site-header">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">👊</span>
        <h1 class="brand-name" id="setup-title">bendervpn</h1>
      </div>
      <a class="nav-code" href="/portal/">&lt;/&gt; инструкция</a>
    </header>
    <p id="setup-lead" class="lead"></p>

    <p id="setup-loading" class="note hidden" role="status">Создаём бесплатный доступ…</p>
    <p id="setup-error" class="note note-accent hidden" role="alert"></p>

    <section id="setup-signup" class="panel">
      <h2 id="signup-heading">Новый пользователь</h2>
      <p id="signup-lead" class="muted"></p>
      <label class="field-label" for="signup-email" id="signup-email-label">Email</label>
      <input type="email" class="field-input" id="signup-email" autocomplete="email" inputmode="email" required>
      <label class="field-label" for="signup-phone" id="signup-phone-label">Телефон (необязательно)</label>
      <input type="tel" class="field-input" id="signup-phone" autocomplete="tel" inputmode="tel">
      <label class="checkbox-row">
        <input type="checkbox" id="signup-terms">
        <span id="signup-terms-label"></span>
      </label>
      <div class="actions" style="margin-top:0.75rem">
        <button type="button" class="btn btn-primary" id="btn-signup-submit">Получить бесплатный доступ</button>
      </div>
      <p id="signup-note" class="muted" style="margin-top:1rem"></p>
    </section>

    <section id="setup-content" class="hidden">
      <p id="setup-success-msg" class="note note-accent"></p>
      <div class="panel qr-wrap">
        <canvas id="setup-qr" aria-label="QR-код"></canvas>
      </div>
      <p><a id="setup-link" class="muted setup-link" href="#" rel="noopener"></a></p>
      <div class="actions">
        <button type="button" class="btn btn-primary" id="btn-copy">Скопировать ссылку</button>
        <a class="btn btn-secondary" id="btn-open-happ" href="#" rel="noopener">Открыть в Happ</a>
      </div>
      <div class="panel">
        <h2>Дальше в Happ</h2>
        <ol class="steps" id="happ-steps"></ol>
      </div>
    </section>

    <nav class="footer-nav">
      <a class="btn btn-ghost" href="/portal/">Инструкция по установке</a>
      <a class="btn btn-ghost" href="/start/">← На главную</a>
      <a class="btn btn-ghost" href="/status">Статус сервиса</a>
    </nav>
  </main>
</body>
</html>

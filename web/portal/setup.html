<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0c">
  <title>BenderVPN — получить настройку</title>
  <link rel="stylesheet" href="/portal/assets/portal.css">
  <script src="https://telegram.org/js/telegram-web-app.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js" defer></script>
  <script src="/portal/assets/setup.js" defer></script>
</head>
<body>
  <main>
    <header class="site-header">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">🤖</span>
        <h1 class="brand-name" id="setup-title">BenderVPN</h1>
      </div>
      <a class="nav-code" href="/portal/">&lt;/&gt; инструкция</a>
    </header>
    <p id="setup-lead" class="lead"></p>

    <p id="setup-loading" class="note hidden" role="status"></p>
    <p id="setup-error" class="note note-accent hidden" role="alert"></p>
    <p id="setup-error-help" class="hidden" style="margin-top:0.5rem">
      <a class="btn btn-ghost btn-no-code" id="setup-error-help-link" href="/start/help/errors/"></a>
    </p>

    <section id="setup-signup" class="panel">
      <h2 id="signup-heading"></h2>
      <p id="signup-lead" class="muted"></p>
      <label class="field-label" for="signup-email" id="signup-email-label"></label>
      <input type="email" class="field-input" id="signup-email" autocomplete="email" inputmode="email" required>
      <label class="field-label" for="signup-phone" id="signup-phone-label"></label>
      <input type="tel" class="field-input" id="signup-phone" autocomplete="tel" inputmode="tel">
      <label class="checkbox-row">
        <input type="checkbox" id="signup-terms">
        <span id="signup-terms-label"></span>
      </label>
      <div class="actions" style="margin-top:0.75rem">
        <button type="button" class="btn btn-primary" id="btn-signup-submit"></button>
      </div>
      <p id="signup-note" class="muted" style="margin-top:1rem"></p>

      <hr style="border:0;border-top:1px solid rgba(34,211,238,0.2);margin:1.25rem 0">
      <h2 id="recover-heading"></h2>
      <p id="recover-lead" class="muted"></p>
      <label class="field-label" for="recover-email"></label>
      <input type="email" class="field-input" id="recover-email" autocomplete="email" inputmode="email">
      <div class="actions" style="margin-top:0.65rem">
        <button type="button" class="btn btn-secondary btn-no-code" id="btn-recover-submit"></button>
      </div>
    </section>

    <section id="setup-content" class="hidden">
      <p id="setup-success-msg" class="note note-accent"></p>
      <p id="setup-step1-lead" class="lead hidden"></p>
      <div class="panel hidden" id="customer-id-panel">
        <p class="field-label" id="customer-id-label"></p>
        <p class="customer-id-box" id="customer-id-value"></p>
        <p class="muted" id="customer-id-hint"></p>
        <button type="button" class="btn btn-secondary btn-no-code" id="btn-copy-id"></button>
      </div>
      <div class="panel qr-wrap">
        <canvas id="setup-qr" aria-label="QR-код"></canvas>
      </div>
      <p class="setup-link-wrap muted"><a id="setup-link" class="setup-link" href="#" rel="noopener"></a></p>
      <div class="actions">
        <button type="button" class="btn btn-primary" id="btn-copy"></button>
        <a class="btn btn-secondary" id="btn-open-happ" href="#" rel="noopener"></a>
      </div>
      <div class="panel">
        <h2 id="platform-downloads-title"></h2>
        <div class="actions" id="platform-downloads" style="margin-bottom:0.75rem"></div>
        <h2 id="happ-steps-title"></h2>
        <ol class="steps" id="happ-steps"></ol>
        <p style="margin-top:0.75rem">
          <a class="store-link" id="happ-store-link" href="#" target="_blank" rel="noopener" hidden></a>
        </p>
        <p style="margin-top:0.75rem">
          <a class="btn btn-secondary btn-no-code" id="btn-setup-guide" href="/portal/guide.html"></a>
        </p>
      </div>
      <section id="bind-tg-panel" class="panel panel-step2 hidden">
        <h2 id="bind-tg-title"></h2>
        <p class="muted" id="bind-tg-lead"></p>
        <div class="actions">
          <a class="btn btn-secondary" id="btn-bind-tg" href="#" target="_blank" rel="noopener"></a>
          <button type="button" class="btn btn-ghost btn-no-code" id="btn-copy-bind"></button>
        </div>
        <p class="muted" id="bind-tg-note"></p>
      </section>
    </section>

    <nav class="footer-nav">
      <a class="btn btn-ghost btn-no-code" href="/portal/">Инструкция</a>
      <a class="btn btn-ghost btn-no-code" href="/start/">← Главная</a>
      <a class="btn btn-ghost btn-no-code" href="/status">Статус</a>
    </nav>
  </main>
</body>
</html>
